<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>dear noorarissya</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:none}
body{
  height:100dvh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  font-family:'Lato',sans-serif;
  background:#0a1628;
  overflow:hidden;
}
#sky{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#aurora{position:fixed;top:0;left:0;width:100%;height:55%;z-index:0;pointer-events:none;opacity:0.35;}
#tulips{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;}
.card{
  position:relative;z-index:10;
  width:92%;max-width:380px;
  margin-top:clamp(10px,2.5vh,22px);
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(210,220,240,0.25);
  border-radius:28px;
  padding:clamp(14px,2.8vh,20px) 20px clamp(10px,2vh,16px);
  text-align:center;
  box-shadow:0 0 60px rgba(150,200,255,0.08),inset 0 1px 0 rgba(255,255,255,0.15);
  flex-shrink:0;
  transition:transform 0.1s ease;
}
.card::before{
  content:'';position:absolute;inset:-1px;
  border-radius:29px;
  background:linear-gradient(135deg,rgba(192,210,230,0.5),rgba(255,255,255,0.05),rgba(180,200,220,0.4),rgba(255,255,255,0.02));
  z-index:-1;
  animation:shimmerBorder 4s linear infinite;
}
@keyframes shimmerBorder{0%{opacity:0.6}50%{opacity:1}100%{opacity:0.6}}
.for-name{
  font-size:0.62rem;letter-spacing:0.38em;
  text-transform:uppercase;
  color:rgba(200,220,240,0.7);
  font-weight:400;
  opacity:0;animation:rise 1s 0.3s ease forwards;
}
.photo-wrap{
  margin:clamp(8px,1.4vh,12px) auto;
  width:clamp(68px,17vw,88px);
  opacity:0;animation:rise 1s 0.5s ease forwards;
}
.photo-frame{
  position:relative;border-radius:16px;padding:3px;
  background:linear-gradient(135deg,#c8d8e8,#e8f0f8,#a0b8d0,#dce8f0);
  box-shadow:0 0 20px rgba(160,200,240,0.3),0 0 40px rgba(160,200,240,0.1);
  animation:silverGlow 3s ease-in-out infinite;
}
@keyframes silverGlow{
  0%,100%{box-shadow:0 0 20px rgba(160,200,240,0.3),0 0 40px rgba(160,200,240,0.1)}
  50%{box-shadow:0 0 30px rgba(160,200,240,0.5),0 0 60px rgba(160,200,240,0.2)}
}
.photo-frame img{
  width:100%;aspect-ratio:3/4;object-fit:cover;
  border-radius:13px;display:block;
}
.divider{
  display:flex;align-items:center;gap:8px;
  margin:clamp(6px,1.2vh,10px) auto;
  opacity:0;animation:rise 1s 0.8s ease forwards;
}
.divider-line{flex:1;height:1px;background:rgba(180,210,240,0.2);}
.divider-duck{font-size:0.9rem;}
.body{opacity:0;animation:rise 1s 1s ease forwards;}
.body p{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(0.95rem,3.8vw,1.12rem);
  font-style:italic;font-weight:300;
  color:rgba(220,235,250,0.92);
  line-height:1.85;
  margin-bottom:clamp(6px,1.2vh,10px);
  text-shadow:0 0 20px rgba(150,200,255,0.3);
}
.body p:last-child{margin-bottom:0;}
.word{display:inline;opacity:0;transition:opacity 0.5s ease;}
.word.show{opacity:1;}
.sign{
  margin-top:clamp(6px,1.4vh,12px);
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(0.88rem,3.2vw,1rem);
  color:rgba(190,215,240,0.8);
  font-style:italic;font-weight:300;
  opacity:0;animation:rise 1s 4.2s ease forwards;
}
.date{
  margin-top:3px;font-size:0.6rem;
  letter-spacing:0.18em;
  color:rgba(150,185,215,0.6);font-weight:300;
  opacity:0;animation:rise 1s 4.5s ease forwards;
}
@keyframes rise{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
.hint{
  position:relative;z-index:10;
  font-size:0.58rem;letter-spacing:0.2em;
  color:rgba(150,190,220,0.45);
  text-transform:uppercase;
  margin-top:4px;flex-shrink:0;
  opacity:0;animation:rise 1s 5s ease forwards;
}
.ocean-wrap{
  width:100%;
  height:clamp(100px,20vh,150px);
  position:relative;z-index:5;
  flex-shrink:0;overflow:hidden;
}
#ocean{display:block;width:100%;height:100%;}
#duck{position:absolute;top:0;left:0;width:100%;height:100%;}
.ripple{
  position:fixed;border-radius:50%;
  border:2px solid rgba(160,210,255,0.6);
  pointer-events:none;z-index:20;
  animation:rippleOut 0.8s ease forwards;
}
@keyframes rippleOut{
  from{width:0;height:0;opacity:0.8;transform:translate(-50%,-50%)}
  to{width:80px;height:80px;opacity:0;transform:translate(-50%,-50%)}
}
</style>
</head>
<body>

<canvas id="sky"></canvas>
<canvas id="aurora"></canvas>
<canvas id="tulips"></canvas>

<div class="card" id="card">
  <p class="for-name">for noorarissya</p>
  <div class="photo-wrap">
    <div class="photo-frame">
      <img src="eri.jpg" alt="Noorarissya"/>
    </div>
  </div>
  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-duck">🦆</span>
    <div class="divider-line"></div>
  </div>
  <div class="body">
    <p id="p1"></p>
    <p id="p2"></p>
  </div>
  <p class="sign">— sincerely, e 🤍</p>
  <p class="date">27 · 05 · 2026</p>
</div>

<p class="hint">tap anywhere · touch to make ripples</p>

<div class="ocean-wrap">
  <canvas id="ocean"></canvas>
  <canvas id="duck"></canvas>
</div>

<script>
var sky=document.getElementById('sky');
var sx=sky.getContext('2d');
var SW,SH;
function resizeSky(){SW=sky.width=innerWidth;SH=sky.height=innerHeight;}
resizeSky();
addEventListener('resize',resizeSky);
var stars=[];
for(var i=0;i<120;i++){
  stars.push({x:Math.random(),y:Math.random()*0.6,r:0.4+Math.random()*1.2,twinkle:Math.random()*Math.PI*2,speed:0.02+Math.random()*0.04});
}
function drawStars(){
  sx.clearRect(0,0,SW,SH);
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    s.twinkle+=s.speed;
    var a=0.4+Math.sin(s.twinkle)*0.4;
    sx.fillStyle='rgba(220,235,255,'+a+')';
    sx.beginPath();sx.arc(s.x*SW,s.y*SH,s.r,0,Math.PI*2);sx.fill();
  }
}

var aur=document.getElementById('aurora');
var ax=aur.getContext('2d');
var AW,AH;
function resizeAur(){AW=aur.width=innerWidth;AH=aur.height=innerHeight*0.55;}
resizeAur();
addEventListener('resize',resizeAur);
var auroraColors=[[100,180,220],[130,200,180],[160,140,210]];
function drawAurora(t){
  ax.clearRect(0,0,AW,AH);
  for(var i=0;i<3;i++){
    var c=auroraColors[i];
    var y=AH*(0.3+i*0.15)+Math.sin(t*0.3+i)*AH*0.08;
    var g=ax.createLinearGradient(0,y-60,0,y+60);
    g.addColorStop(0,'rgba('+c+',0)');
    g.addColorStop(0.5,'rgba('+c+',0.18)');
    g.addColorStop(1,'rgba('+c+',0)');
    ax.fillStyle=g;
    ax.beginPath();ax.moveTo(0,y);
    for(var x=0;x<=AW;x+=8){
      ax.lineTo(x,y+Math.sin(x*0.008+t*0.4+i*1.5)*30+Math.sin(x*0.02+t*0.2)*12);
    }
    ax.lineTo(AW,0);ax.lineTo(0,0);ax.closePath();ax.fill();
  }
}

var tc=document.getElementById('tulips');
var tx=tc.getContext('2d');
var TW,TH;
function resizeTc(){TW=tc.width=innerWidth;TH=tc.height=innerHeight;}
resizeTc();
addEventListener('resize',resizeTc);
var fallingTulips=[];
for(var i=0;i<14;i++){
  fallingTulips.push({
    x:Math.random()*100,y:-20-Math.random()*100,
    speed:0.4+Math.random()*0.6,
    drift:(Math.random()-0.5)*0.3,
    scale:0.6+Math.random()*0.7,
    alpha:0.3+Math.random()*0.4
  });
}
function drawTulip(ctx,x,y,scale,alpha){
  ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);ctx.globalAlpha=alpha;
  ctx.strokeStyle='rgba(180,210,180,0.8)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,8);ctx.lineTo(0,22);ctx.stroke();
  ctx.fillStyle='rgba(210,225,240,0.85)';
  ctx.beginPath();ctx.ellipse(-5,-2,4,9,-0.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(5,-2,4,9,0.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(240,245,255,0.95)';
  ctx.beginPath();ctx.ellipse(0,-4,4,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.ellipse(0,-5,2,6,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawTulips(){
  tx.clearRect(0,0,TW,TH);
  for(var i=0;i<fallingTulips.length;i++){
    var f=fallingTulips[i];
    f.y+=f.speed;f.x+=f.drift;
    if(f.y>TH+40){f.y=-30;f.x=Math.random()*100;}
    drawTulip(tx,f.x/100*TW,f.y,f.scale,f.alpha);
  }
}

var oc=document.getElementById('ocean');
var ox=oc.getContext('2d');
var ot=0;
function resizeOc(){oc.width=oc.offsetWidth;oc.height=oc.offsetHeight;}
resizeOc();addEventListener('resize',resizeOc);
function drawOcean(){
  var W=oc.width,H=oc.height;
  ox.clearRect(0,0,W,H);
  var g=ox.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a5a80');g.addColorStop(0.5,'#0e3d5c');g.addColorStop(1,'#061828');
  ox.fillStyle=g;ox.fillRect(0,0,W,H);
  ox.fillStyle='rgba(220,235,255,0.06)';
  ox.beginPath();ox.ellipse(W*0.5,H*0.3,W*0.08,H*0.8,0,0,Math.PI*2);ox.fill();
  var ws=[
    {a:7,f:0.012,s:0.6,y:0.12,c:'rgba(150,200,240,0.2)'},
    {a:5,f:0.019,s:1.0,y:0.38,c:'rgba(180,220,255,0.14)'},
    {a:3,f:0.028,s:1.4,y:0.62,c:'rgba(200,230,255,0.09)'}
  ];
  for(var i=0;i<ws.length;i++){
    var w=ws[i];
    var wy=H*w.y;
    ox.beginPath();ox.moveTo(0,wy);
    for(var x=0;x<=W;x+=3)ox.lineTo(x,wy+Math.sin(x*w.f+ot*w.s)*w.a);
    ox.lineTo(W,H);ox.lineTo(0,H);ox.closePath();
    ox.fillStyle=w.c;ox.fill();
  }
  ox.fillStyle='rgba(200,230,255,0.7)';
  for(var i=0;i<16;i++){
    var sx2=(i*137+ot*18)%W;
    var sy=H*0.15+Math.sin(sx2*0.022+ot)*6+(i%5)*14;
    var sr=0.6+Math.sin(ot*2+i)*0.4;
    ox.beginPath();ox.arc(sx2,sy,sr,0,Math.PI*2);ox.fill();
  }
}

var dc=document.getElementById('duck');
var dx=dc.getContext('2d');
var dt=0;
function resizeDc(){dc.width=dc.offsetWidth;dc.height=dc.offsetHeight;}
resizeDc();addEventListener('resize',resizeDc);
function drawDuck(ctx,x,y,flip,size){
  if(size===undefined)size=1;
  ctx.save();ctx.translate(x,y);if(flip){ctx.scale(-1,1);}ctx.scale(size,size);
  ctx.fillStyle='#f0ece0';
  ctx.beginPath();ctx.ellipse(0,2,16,11,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ddd8c4';
  ctx.beginPath();ctx.ellipse(-2,3,11,7,-0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(210,220,235,0.6)';
  ctx.beginPath();ctx.ellipse(-1,2,7,4,-0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f0ece0';
  ctx.beginPath();ctx.arc(14,-5,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1a2530';
  ctx.beginPath();ctx.arc(17,-7,1.6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.beginPath();ctx.arc(17.5,-7.5,0.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8a020';
  ctx.beginPath();ctx.moveTo(22,-5);ctx.lineTo(29,-4);ctx.lineTo(22,-2);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ddd8c4';
  ctx.beginPath();ctx.moveTo(-14,-1);ctx.lineTo(-23,-8);ctx.lineTo(-12,3);ctx.closePath();ctx.fill();
  ctx.restore();
}
var beachDucks=[{xp:0.15,phase:0},{xp:0.72,phase:1.2},{xp:0.88,phase:2.1}];
function drawDucks(){
  var W=dc.width,H=dc.height;
  dx.clearRect(0,0,W,H);
  var waterY=H*0.32;
  var d1x=(dt*18)%(W+100)-20;
  var d2x=W-((dt*13+250)%(W+100));
  drawDuck(dx,d1x,waterY+Math.sin(dt*1.8)*3,false,1);
  drawDuck(dx,d2x,waterY+Math.sin(dt*1.8+1.4)*3,true,1);
  for(var i=0;i<beachDucks.length;i++){
    var b=beachDucks[i];
    drawDuck(dx,b.xp*W,H*0.72+Math.sin(dt*1.2+b.phase)*2,b.xp>0.5,0.65);
  }
}

document.addEventListener('click',function(e){
  var r=document.createElement('div');
  r.className='ripple';
  r.style.left=e.clientX+'px';r.style.top=e.clientY+'px';
  document.body.appendChild(r);
  setTimeout(function(){r.remove();},800);
  fallingTulips.push({
    x:e.clientX/innerWidth*100,
    y:e.clientY/innerHeight*100-5,
    speed:0.3+Math.random()*0.5,
    drift:(Math.random()-0.5)*0.4,
    scale:0.5+Math.random()*0.6,
    alpha:0.5+Math.random()*0.4
  });
  if(fallingTulips.length>22)fallingTulips.shift();
});

var card=document.getElementById('card');
document.addEventListener('mousemove',function(e){
  var cx=innerWidth/2,cy=innerHeight/2;
  var rx=((e.clientY-cy)/cy)*6;
  var ry=-((e.clientX-cx)/cx)*6;
  card.style.transform='perspective(600px) rotateX('+rx+'deg) rotateY('+ry+'deg)';
});
document.addEventListener('touchmove',function(e){
  var t=e.touches[0];
  var cx=innerWidth/2,cy=innerHeight/2;
  var rx=((t.clientY-cy)/cy)*5;
  var ry=-((t.clientX-cx)/cx)*5;
  card.style.transform='perspective(600px) rotateX('+rx+'deg) rotateY('+ry+'deg)';
},{passive:true});
document.addEventListener('mouseleave',function(){card.style.transform='';});
document.addEventListener('touchend',function(){card.style.transform='';});

var gt=0;
function mainLoop(){
  drawStars();drawAurora(gt);drawTulips();drawOcean();drawDucks();
  gt+=0.016;ot+=0.016;dt+=0.016;
  requestAnimationFrame(mainLoop);
}
mainLoop();

var lines=[
  {id:'p1',text:'you are the breeze i never noticed i was breathing — quiet, constant, and somehow exactly what i needed.'},
  {id:'p2',text:'thank you for staying. thank you for existing. thank you for being the kind of presence the heart remembers before the mind does.'}
];
function reveal(id,text,start){
  var el=document.getElementById(id);el.innerHTML='';
  var words=text.split(' ');
  for(var i=0;i<words.length;i++){
    (function(w,idx){
      var s=document.createElement('span');s.className='word';s.textContent=w;
      el.appendChild(s);
      if(idx<words.length-1)el.appendChild(document.createTextNode(' '));
      setTimeout(function(){s.classList.add('show');},start+idx*65);
    })(words[i],i);
  }
  return start+words.length*65;
}
var d=1300;
for(var i=0;i<lines.length;i++){
  d=reveal(lines[i].id,lines[i].text,d)+300;
}
</script>
</body>
</html>
