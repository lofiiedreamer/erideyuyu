<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For You 💛</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff0f5;
      font-family: 'Georgia', serif;
      padding: 2rem;
    }

    .card {
      max-width: 520px;
      text-align: center;
    }

    .emoji { font-size: 3rem; margin-bottom: 1rem; }

    h1 {
      font-size: 2rem;
      color: #c0397a;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.1rem;
      color: #555;
      line-height: 1.9;
      margin-bottom: 1rem;
    }

    .sign {
      margin-top: 2rem;
      font-style: italic;
      color: #c0397a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🌸</div>
    <h1>To My Person</h1>

    <p>Every day with you feels like something I never knew I needed.</p>
    <p>Thank you for being you — patient, kind, and endlessly wonderful.</p>
    <p>I just wanted to put it somewhere on the internet, so the whole world knows.</p>

    <div class="sign">— yours, always 💛</div>
  </div>
</body>
</html>
